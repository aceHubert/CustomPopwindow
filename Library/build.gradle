apply plugin: 'com.android.library'
apply plugin: 'maven'

group = project.hasProperty('group') ? project.property('group') : 'com.github.aceHubert'
version = project.hasProperty('version') ? project.property('version') : '2.1.1-fix'
archivesBaseName = 'CustomPopwindow'
android {
    compileSdkVersion 24
    buildToolsVersion "24.0.2"
  //  resourcePrefix "customPop__"	//这个随便填
    defaultConfig {
        minSdkVersion 16
        targetSdkVersion 24
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"

    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    compile fileTree(dir: 'libs', include: ['*.jar'])
    androidTestCompile('com.android.support.test.espresso:espresso-core:2.2.2', {
        exclude group: 'com.android.support', module: 'support-annotations'
    })
    compile 'com.android.support:appcompat-v7:24.2.1'
    testCompile 'junit:junit:4.12'
}

artifacts {
    archives file("$buildDir/outputs/aar/Library-release.aar")
}

install {
    repositories.mavenInstaller {
        pom.groupId = project.group
        pom.artifactId = archivesBaseName
        pom.version = project.version
        pom.packaging = 'aar'
    }
}

install.dependsOn assembleRelease
task publishToMavenLocal(dependsOn: install)
